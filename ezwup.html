<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ezwup</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Courier New',Courier,monospace;background:#0a0f0a;color:#00cc44;font-size:13px;overflow:hidden}
:root{--green:#00cc44;--green-dim:#007a28;--green-bright:#33ff77;--bg:#0a0f0a;--bg2:#0f1a0f;--bg3:#0d150d;--border:#1a3a1a;--muted:#3a6a3a;--red:#cc4444}
#app{display:flex;height:100vh;overflow:hidden}
#left{width:46%;min-width:280px;border-right:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;transition:width .25s}
#left.preview-hidden{width:100%}
#right{flex:1;display:flex;flex-direction:column;background:var(--bg3);min-width:0;transition:all .25s}
#right.hidden{display:none}
.topbar{padding:7px 14px;border-bottom:1px solid var(--border);background:#080d08;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:10px}
.logo{font-size:14px;letter-spacing:1px}
.logo em{color:var(--green-bright);font-style:normal;font-weight:bold}
.logo span{color:var(--muted);font-size:11px}
.cursor{display:inline-block;width:7px;height:11px;background:var(--green);animation:blink 1s step-end infinite;vertical-align:middle;margin-left:2px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.toolbar{padding:7px 10px;border-bottom:1px solid var(--border);background:#080d08;display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0}
.btn{background:transparent;border:1px solid var(--green-dim);color:var(--green);font-family:'Courier New',monospace;font-size:11px;padding:4px 9px;cursor:pointer;letter-spacing:.4px;transition:all .12s}
.btn:hover{background:var(--green-dim);color:#fff}
.btn:active{transform:scale(0.97)}
.btn.danger{border-color:#552222;color:var(--red)}
.btn.danger:hover{background:#331111;color:var(--red)}
.btn.accent{border-color:var(--green);color:var(--green-bright)}
.btn.accent:hover{background:var(--green-dim);color:#fff}
.btn.toggle{border-color:var(--border);color:var(--muted);font-size:10px;padding:3px 8px}
.btn.toggle:hover{border-color:var(--green-dim);color:var(--green)}
.btn.toggle.active{border-color:var(--green-dim);color:var(--green)}
.sections{padding:10px;flex:1;overflow-y:auto}
.section{margin-bottom:9px;border:1px solid var(--border)}
.section-head{padding:6px 10px;background:#0a150a;color:var(--green-bright);font-size:11px;letter-spacing:1px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);user-select:none}
.section-head:hover{background:#0f1f0f}
.arrow{color:var(--muted);font-size:10px;transition:transform .2s}
.section-body{padding:10px;display:flex;flex-direction:column;gap:7px}
.section-body.collapsed{display:none}
label{color:var(--muted);font-size:11px;margin-bottom:2px;display:block;letter-spacing:.3px}
input[type=text],input[type=url],select,textarea{background:#060d06;border:1px solid var(--border);color:var(--green);font-family:'Courier New',monospace;font-size:12px;padding:5px 8px;width:100%;outline:none;transition:border-color .1s}
input[type=text]:focus,input[type=url]:focus,select:focus,textarea:focus{border-color:var(--green-dim)}
input[type=url]{color:#5599ff}
select option{background:#0a0f0a;color:var(--green)}
textarea{resize:vertical;min-height:70px;line-height:1.5}
.field{display:flex;flex-direction:column}
.preview-topbar{padding:7px 14px;border-bottom:1px solid var(--border);background:#080d08;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.preview-topbar-left{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted)}
.preview-topbar-left span{color:var(--green)}
#preview-wrap{flex:1;overflow-y:auto;padding:14px 16px}
pre#preview{white-space:pre-wrap;word-break:break-word;font-family:'Courier New',monospace;font-size:12px;color:#c8e6c8;line-height:1.7}
.md-h1{color:var(--green-bright);font-weight:bold}
.md-h2{color:#22cc66}
.md-h3{color:#1aaa55}
.md-code{color:#88ffaa;background:#050f05}
.md-todo{color:var(--red)}
.md-bold{color:#eee}
.md-sep{color:#1a3a1a}
.md-table{color:#aaddaa}
.md-link{color:#5599ff}
.status-bar{padding:4px 14px;border-top:1px solid var(--border);font-size:10px;color:var(--muted);background:#080d08;flex-shrink:0;display:flex;justify-content:space-between}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#060d06}
::-webkit-scrollbar-thumb{background:var(--green-dim)}
</style>
</head>
<body>
<div id="app">
  <div id="left">
    <div class="topbar">
      <div class="topbar-left">
        <div class="logo"><em>ez</em>WRITEUP<span> // ezwup</span></div>
        <span style="color:var(--muted);font-size:10px">root@kali:~$<span class="cursor"></span></span>
      </div>
    </div>
    <div class="toolbar">
      <button class="btn accent" onclick="generate()">[ GENERATE ]</button>
      <button class="btn" onclick="copyMd()">[ COPY ]</button>
      <button class="btn" onclick="exportMd()">[ EXPORT .MD ]</button>
      <button class="btn danger" onclick="resetAll()">[ RESET ]</button>
      <button class="btn toggle active" id="toggleBtn" onclick="togglePreview()">[ PREVIEW ON ]</button>
    </div>
    <div class="sections" id="sections"></div>
    <div class="status-bar"><span id="status">Ready. Fill fields and click GENERATE.</span><span id="charcount"></span></div>
  </div>
  <div id="right">
    <div class="preview-topbar">
      <div class="preview-topbar-left"><span>PREVIEW</span> &nbsp;|&nbsp; markdown output</div>
    </div>
    <div id="preview-wrap"><pre id="preview">## Run [ GENERATE ] to render output.</pre></div>
    <div class="status-bar"><span id="status2"></span></div>
  </div>
</div>

<script>
const FIELDS=[
  {id:'machine',label:'[ 01 ] MACHINE INFO',fields:[
    {key:'name',label:'Machine Name',type:'text',ph:'e.g. Lame'},
    {key:'ip',label:'IP Address',type:'text',ph:'e.g. 10.10.10.3'},
    {key:'link',label:'Machine Link (URL)',type:'url',ph:'e.g. https://app.hackthebox.com/machines/Lame'},
    {key:'date',label:'Date (YYYY-MM-DD)',type:'text',ph:new Date().toISOString().slice(0,10)},
    {key:'os',label:'Operating System',type:'select',opts:['Linux','Windows','Unknown']},
    {key:'diff',label:'Difficulty',type:'select',opts:['Easy','Medium','Hard','Insane']},
  ]},
  {id:'enum',label:'[ 02 ] ENUMERATION',fields:[
    {key:'nmap',label:'Nmap Output',type:'textarea',ph:'# nmap -sC -sV -oN nmap/initial 10.10.10.3\n21/tcp  open  ftp\n22/tcp  open  ssh\n445/tcp open  microsoft-ds'},
    {key:'ports',label:'Port / Service Notes',type:'textarea',ph:'Port 21 - FTP anonymous login allowed\nPort 445 - SMB, check EternalBlue\nPort 22 - SSH, check version'},
  ]},
  {id:'web',label:'[ 03 ] WEB ENUMERATION',fields:[
    {key:'gobuster',label:'Gobuster / Dirsearch Output',type:'textarea',ph:'# gobuster dir -u http://10.10.10.3 -w /usr/share/wordlists/dirbuster/directory-list-2.3-medium.txt\n/admin   (Status: 200)\n/uploads (Status: 403)'},
    {key:'endpoints',label:'Interesting Endpoints / Findings',type:'textarea',ph:'/admin -> Login panel\n/uploads -> File upload possible\n/robots.txt -> Disallows /secret'},
    {key:'tech',label:'Tech Stack',type:'text',ph:'e.g. Apache 2.4.7, PHP 5.x, WordPress 5.8'},
  ]},
  {id:'vuln',label:'[ 04 ] VULNERABILITY & EXPLOITATION',fields:[
    {key:'cve',label:'CVE / Vulnerability Name',type:'text',ph:'e.g. CVE-2004-2687 - Distcc RCE'},
    {key:'vuln_desc',label:'Vulnerability Description',type:'textarea',ph:'Describe the vulnerability, why it exists and why the target is affected...'},
    {key:'exploit',label:'Exploit Commands (one per line)',type:'textarea',ph:'searchsploit distcc\nuse exploit/unix/misc/distcc_exec\nset RHOSTS 10.10.10.3\nrun'},
    {key:'exploit_out',label:'Exploit Output / Shell Proof',type:'textarea',ph:'[*] Command shell session 1 opened\nid\nuid=1(daemon) gid=1(daemon)'},
  ]},
  {id:'privesc',label:'[ 05 ] PRIVILEGE ESCALATION',fields:[
    {key:'enum_privesc',label:'Local Enumeration Commands',type:'textarea',ph:'id\nuname -a\nfind / -perm -4000 2>/dev/null\nsudo -l'},
    {key:'privesc_vector',label:'PrivEsc Vector / Method',type:'text',ph:'e.g. SUID nmap binary'},
    {key:'privesc_steps',label:'PrivEsc Commands / Steps',type:'textarea',ph:'nmap --interactive\n!sh\nid'},
    {key:'privesc_out',label:'Root Proof Output',type:'textarea',ph:'# id\nuid=0(root) gid=0(root) groups=0(root)'},
  ]},
  {id:'flags',label:'[ 06 ] FLAGS',fields:[
    {key:'user_flag',label:'user.txt',type:'text',ph:'e.g. a87f5ad4c66e8a6e7d59d5d1a7f1234'},
    {key:'root_flag',label:'root.txt',type:'text',ph:'e.g. 3b7c8ad1f0e24e2d1a5b6c7d8e9f0123'},
  ]},
  {id:'notes',label:'[ 07 ] LESSONS LEARNED & NOTES',fields:[
    {key:'lessons',label:'Lessons Learned',type:'textarea',ph:'- Always enumerate anonymous FTP\n- Check Metasploit for known CVEs early'},
    {key:'free',label:'Free Notes / Additional Observations',type:'textarea',ph:'Rabbit holes, alternative paths, misc observations...'},
  ]},
];

const state={};
let previewVisible=true;

function loadStorage(){try{const d=localStorage.getItem('ezwup_v1');if(d)Object.assign(state,JSON.parse(d));}catch(e){}}
function saveStorage(){try{localStorage.setItem('ezwup_v1',JSON.stringify(state));}catch(e){}}

function copyFallback(text){
  const ta=document.createElement('textarea');
  ta.value=text;
  ta.style.cssText='position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(ta);
  ta.focus();ta.select();
  try{document.execCommand('copy');setStatus('Copied to clipboard.');} 
  catch(e){setStatus('Copy failed - use Export instead.');}
  document.body.removeChild(ta);
}

function buildUI(){
  const sec=document.getElementById('sections');
  sec.innerHTML='';
  FIELDS.forEach(s=>{
    const div=document.createElement('div');
    div.className='section';
    const head=document.createElement('div');
    head.className='section-head';
    const arr=document.createElement('span');
    arr.className='arrow';
    arr.id='arr_'+s.id;
    arr.textContent='▼';
    head.innerHTML=`<span>${s.label}</span>`;
    head.appendChild(arr);
    const body=document.createElement('div');
    body.className='section-body';
    body.id='body_'+s.id;
    head.onclick=()=>{
      body.classList.toggle('collapsed');
      arr.style.transform=body.classList.contains('collapsed')?'rotate(-90deg)':'';
    };
    s.fields.forEach(f=>{
      const fd=document.createElement('div');
      fd.className='field';
      const lbl=document.createElement('label');
      lbl.textContent=f.label;
      fd.appendChild(lbl);
      let el;
      if(f.type==='textarea'){
        el=document.createElement('textarea');
        el.rows=4;
      } else if(f.type==='select'){
        el=document.createElement('select');
        f.opts.forEach(o=>{const opt=document.createElement('option');opt.value=o;opt.textContent=o;el.appendChild(opt);});
      } else {
        el=document.createElement('input');
        el.type=f.type||'text';
      }
      if(f.ph&&el.tagName!=='SELECT')el.placeholder=f.ph;
      el.id='f_'+f.key;
      if(state[f.key]!==undefined)el.value=state[f.key];
      el.addEventListener('input',()=>{state[f.key]=el.value;saveStorage();});
      if(el.tagName==='SELECT')el.addEventListener('change',()=>{state[f.key]=el.value;saveStorage();});
      fd.appendChild(el);
      body.appendChild(fd);
    });
    div.appendChild(head);
    div.appendChild(body);
    sec.appendChild(div);
  });
}

function applyPreviewState(){
  const right=document.getElementById('right');
  const left=document.getElementById('left');
  const btn=document.getElementById('toggleBtn');
  if(previewVisible){
    right.classList.remove('hidden');
    left.classList.remove('preview-hidden');
    btn.textContent='[ PREVIEW ON ]';
    btn.classList.add('active');
  } else {
    right.classList.add('hidden');
    left.classList.add('preview-hidden');
    btn.textContent='[ PREVIEW OFF ]';
    btn.classList.remove('active');
  }
}

function togglePreview(){
  previewVisible=!previewVisible;
  applyPreviewState();
  state._previewVisible=previewVisible;
  saveStorage();
}

function v(k){const el=document.getElementById('f_'+k);return el?el.value.trim():'';}
function todo(val,lbl){return val||`[TODO: ${lbl}]`;}
function codeBlock(c,lang=''){return c?'```'+lang+'\n'+c+'\n```':'[TODO]';}
function bullets(t){if(!t)return'[TODO]';return t.split('\n').filter(l=>l.trim()).map(l=>l.match(/^[-*]/)?l:'- '+l).join('\n');}

function generate(){
  const name=todo(v('name'),'Machine Name');
  const ip=todo(v('ip'),'IP Address');
  const diff=v('diff')||'Unknown';
  const os=v('os')||'Unknown';
  const date=v('date')||new Date().toISOString().slice(0,10);
  const link=v('link');

  let md='';
  md+=`# CTF Writeup: ${name}\n\n`;
  md+=`---\n\n`;
  md+=`## Machine Info\n\n`;
  md+=`| Field | Value |\n`;
  md+=`|-------|-------|\n`;
  md+=`| Name | ${link?`[${name}](${link})`:name} |\n`;
  md+=`| IP | \`${ip}\` |\n`;
  md+=`| OS | ${os} |\n`;
  md+=`| Difficulty | ${diff} |\n`;
  md+=`| Date | ${date} |\n`;
  if(link)md+=`| Link | ${link} |\n`;
  md+='\n';

  md+=`---\n\n## Enumeration\n\n`;
  md+=`### Nmap\n\n`;
  md+=(v('nmap')?codeBlock(v('nmap'),'bash'):`[TODO: Add nmap output]`)+'\n\n';
  md+=`### Port Notes\n\n`;
  md+=bullets(v('ports'))+'\n\n';

  const hasWeb=v('gobuster')||v('endpoints')||v('tech');
  if(hasWeb){
    md+=`---\n\n## Web Enumeration\n\n`;
    if(v('tech'))md+=`**Tech Stack:** ${v('tech')}\n\n`;
    if(v('gobuster')){md+=`### Directory Bruteforce\n\n`+codeBlock(v('gobuster'),'bash')+'\n\n';}
    if(v('endpoints')){md+=`### Interesting Endpoints\n\n`+bullets(v('endpoints'))+'\n\n';}
  }

  md+=`---\n\n## Vulnerability & Exploitation\n\n`;
  if(v('cve'))md+=`**${v('cve')}**\n\n`;
  md+=(v('vuln_desc')||`[TODO: Describe the vulnerability]`)+'\n\n';
  md+=`### Exploit\n\n`;
  md+=(v('exploit')?codeBlock(v('exploit'),'bash'):`[TODO: Document exploit steps]`)+'\n\n';
  if(v('exploit_out')){md+=`### Output\n\n`+codeBlock(v('exploit_out'))+'\n\n';}

  md+=`---\n\n## Privilege Escalation\n\n`;
  md+=`### Local Enumeration\n\n`;
  md+=(v('enum_privesc')?codeBlock(v('enum_privesc'),'bash'):`[TODO: Add enumeration commands]`)+'\n\n';
  if(v('privesc_vector')){md+=`### Vector\n\n`+v('privesc_vector')+'\n\n';}
  md+=`### Steps\n\n`;
  md+=(v('privesc_steps')?codeBlock(v('privesc_steps'),'bash'):`[TODO: Document privesc steps]`)+'\n\n';
  if(v('privesc_out')){md+=`### Root Proof\n\n`+codeBlock(v('privesc_out'))+'\n\n';}

  md+=`---\n\n## Flags\n\n`;
  md+=`| Flag | Value |\n|------|-------|\n`;
  md+=`| user.txt | \`${todo(v('user_flag'),'user.txt')}\` |\n`;
  md+=`| root.txt | \`${todo(v('root_flag'),'root.txt')}\` |\n\n`;

  md+=`---\n\n## Lessons Learned\n\n`;
  md+=bullets(v('lessons'))+'\n\n';
  if(v('free')){md+=`## Notes\n\n`+v('free')+'\n\n';}

  state._md=md;
  renderPreview(md);
  const todos=(md.match(/\[TODO/g)||[]).length;
  setStatus(`Generated. ${todos} [TODO] field(s) remaining.`,`${md.length} chars`);
}

function renderPreview(md){
  const el=document.getElementById('preview');
  let h=md.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h=h.replace(/^(# .+)$/gm,'<span class="md-h1">$1</span>');
  h=h.replace(/^(## .+)$/gm,'<span class="md-h2">$1</span>');
  h=h.replace(/^(### .+)$/gm,'<span class="md-h3">$1</span>');
  h=h.replace(/^(---)/gm,'<span class="md-sep">$1</span>');
  h=h.replace(/```[\w]*\n([\s\S]*?)```/g,(m,c)=>`<span class="md-code">\`\`\`\n${c}\`\`\`</span>`);
  h=h.replace(/\[TODO[^\]]*\]/g,'<span class="md-todo">$&</span>');
  h=h.replace(/\*\*([^*]+)\*\*/g,'<span class="md-bold">**$1**</span>');
  h=h.replace(/(\|[^|\n]+)+\|/g,'<span class="md-table">$&</span>');
  h=h.replace(/(https?:\/\/[^\s)\]]+)/g,'<span class="md-link">$1</span>');
  el.innerHTML=h;
}

function setStatus(msg,right=''){
  document.getElementById('status').textContent=msg;
  document.getElementById('status2').textContent=right;
}

function copyMd(){
  if(!state._md){setStatus('Generate first.');return;}
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(state._md)
      .then(()=>setStatus('Copied to clipboard.'))
      .catch(()=>copyFallback(state._md));
  } else {
    copyFallback(state._md);
  }
}

function exportMd(){
  if(!state._md){generate();}
  const slug=(v('name')||'writeup').replace(/\s+/g,'_').toLowerCase().replace(/[^a-z0-9_]/g,'');
  const blob=new Blob([state._md],{type:'text/markdown'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(slug||'writeup')+'_writeup.md';
  a.click();
  setStatus(`Exported: ${a.download}`);
}

function resetAll(){
  if(!confirm('Reset all fields and clear saved data?'))return;
  FIELDS.forEach(s=>s.fields.forEach(f=>{
    const el=document.getElementById('f_'+f.key);
    if(el)el.value='';
    delete state[f.key];
  }));
  state._md='';
  localStorage.removeItem('ezwup_v1');
  document.getElementById('preview').innerHTML='## Run [ GENERATE ] to render output.';
  setStatus('Reset complete. All fields cleared.');
}

loadStorage();
if(state._previewVisible===false){previewVisible=false;}
buildUI();
applyPreviewState();
if(state._md)renderPreview(state._md);
</script>
</body>
</html>
